appropriately\n- TEST on both iOS and Android\n- CONSIDER different screen sizes and notches\n- USE native features through proper APIs\n- IMPLEMENT proper error handling\n</rules>\n\n## Usage Examples\n\n### Codex Usage\n\n```bash\n# Codex prompt: React Native app\ncodex \"Spawn mobile_developer to Build a React Native fitness tracking app with workout logging and progress charts\"\n\n# Flutter app\ncodex \"Spawn mobile_developer to Create a Flutter shopping app with product catalog and cart functionality\"\n```\n\n### Codex Usage\n\n```text\nSpawn mobile_developer to Build a React Native social media feed with infinite scroll and image uploads\n```\n\n## Limitations\n\n- Emulator and device testing requires the appropriate local setup and permissions\n- Platform-specific issues may require manual testing\n- App store submission requires manual process\n\n## Tips for Best Results\n\n- Specify platform (React Native, Flutter, native)\n- Mention iOS and Android requirements\n- Include native features needed (camera, GPS, etc.)\n- Share design mockups if available\n- Mention offline functionality requirements\n"
